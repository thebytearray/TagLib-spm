name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ensure TagLibCore spm_public_headers directory
        run: mkdir -p vendor/taglib/taglib/spm_public_headers

      - name: Swift build (host)
        run: swift build

      - name: Swift test (macOS)
        run: swift test

      - name: Build for iOS Simulator
        run: |
          SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
          swift build -c debug --triple arm64-apple-ios15.0-simulator \
            -Xswiftc -sdk -Xswiftc "$SDK" \
            -Xcc -isysroot -Xcc "$SDK"
