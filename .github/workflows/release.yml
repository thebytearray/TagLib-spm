name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "New tag to create (e.g. v1.0.0). Must not already exist on origin."
        required: true
        type: string
      branch:
        description: "Branch to tag (HEAD of this branch is released)"
        required: true
        default: main
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Ensure TagLibCore spm_public_headers directory
        run: mkdir -p vendor/taglib/taglib/spm_public_headers

      - name: Swift test
        run: swift test

      - name: Build XCFramework
        run: |
          chmod +x Scripts/create-xcframework.sh
          ./Scripts/create-xcframework.sh "${{ runner.temp }}/xcframework-out"

      - name: Create and push tag
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if git ls-remote origin "refs/tags/${TAG}" | grep -q .
          then
            echo "::error::Tag '${TAG}' already exists on origin. Choose a new tag."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Zip XCFramework
        run: |
          cd "${{ runner.temp }}/xcframework-out"
          zip -y -r "$GITHUB_WORKSPACE/TagLib.xcframework.zip" TagLib.xcframework
          ls -la "$GITHUB_WORKSPACE/TagLib.xcframework.zip"

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Release ${{ inputs.tag }}
          files: TagLib.xcframework.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
