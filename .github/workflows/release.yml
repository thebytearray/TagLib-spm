# Manual release: tag HEAD of a branch, push the tag, build, upload assets to GitHub Releases.

name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "New tag to create (e.g. v1.0.0). Must not already exist on origin."
        required: true
        type: string
      branch:
        description: "Branch to tag (HEAD of this branch is released)"
        required: true
        default: main
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Ensure TagLibCore spm_public_headers directory
        run: mkdir -p vendor/taglib/taglib/spm_public_headers

      - name: Build macOS release
        run: swift build -c release

      - name: Build iOS Simulator release
        run: |
          SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
          swift build -c release --triple arm64-apple-ios15.0-simulator \
            -Xswiftc -sdk -Xswiftc "$SDK" \
            -Xcc -isysroot -Xcc "$SDK"

      - name: Create and push tag
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if git ls-remote origin "refs/tags/${TAG}" | grep -q .
          then
            echo "::error::Tag '${TAG}' already exists on origin. Choose a new tag."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Package SwiftPM release outputs per triple
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          TAG_SAFE="${TAG//\//-}"
          for d in .build/*/release; do
            [ -d "$d" ] || continue
            triple=$(basename "$(dirname "$d")")
            tar -czf "TagLibSPM-${triple}-${TAG_SAFE}.tar.gz" -C "$d" .
          done
          ls -la TagLibSPM-*.tar.gz

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Release ${{ inputs.tag }}
          files: TagLibSPM-*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
