name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "New tag to create (e.g. v1.0.0). Must not already exist on origin."
        required: true
        type: string
      branch:
        description: "Branch to tag (HEAD of this branch is released)"
        required: true
        default: main
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail fast if tag already exists on origin
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if git ls-remote origin "refs/tags/${TAG}" | grep -q .
          then
            echo "::error::Tag '${TAG}' already exists on origin. Choose a new tag."
            exit 1
          fi

      - name: Ensure TagLibCore spm_public_headers directory
        run: mkdir -p vendor/taglib/taglib/spm_public_headers

      - name: Swift test (BuildPackage)
        working-directory: BuildPackage
        run: swift test

      - name: Build XCFramework + zip + checksum
        run: |
          chmod +x Scripts/create-xcframework.sh
          ./Scripts/create-xcframework.sh "${{ runner.temp }}/xc"

      - name: Patch root Package.swift with tag + checksum
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          CHECKSUM="$(cat "${{ runner.temp }}/xc/TagLib.xcframework.zip.sha256")"
          echo "Tag:      $TAG"
          echo "Checksum: $CHECKSUM"
          # BSD sed on macOS: `-i ''` for in-place without backup.
          sed -i '' -E "s/^let release = \".*\"/let release = \"${TAG}\"/" Package.swift
          sed -i '' -E "s/^let checksum = \".*\"/let checksum = \"${CHECKSUM}\"/" Package.swift
          echo "--- Patched Package.swift ---"
          grep -E "^let (release|checksum) = " Package.swift

      - name: Commit, tag, push
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "Release ${TAG}"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "HEAD:${{ inputs.branch }}"
          git push origin "${TAG}"

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Release ${{ inputs.tag }}
          files: ${{ runner.temp }}/xc/TagLib.xcframework.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
