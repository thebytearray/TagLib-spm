name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "New tag to create (e.g. v1.0.0). Must not already exist on origin."
        required: true
        type: string
      branch:
        description: "Branch to release from (source state that the xcframework is built against)."
        required: true
        default: main
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail fast if tag already exists on origin
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if git ls-remote origin "refs/tags/${TAG}" | grep -q .
          then
            echo "::error::Tag '${TAG}' already exists on origin. Choose a new tag."
            exit 1
          fi

      - name: Ensure TagLibCore spm_public_headers directory
        run: mkdir -p vendor/taglib/taglib/spm_public_headers

      - name: Swift test (source manifest on main)
        run: swift test

      - name: Build XCFramework + zip + checksum
        run: |
          chmod +x Scripts/create-xcframework.sh
          ./Scripts/create-xcframework.sh "${{ runner.temp }}/xc"

      - name: Generate binary Package.swift for the release tag
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          CHECKSUM="$(cat "${{ runner.temp }}/xc/TagLib.xcframework.zip.sha256")"
          echo "Tag:      $TAG"
          echo "Checksum: $CHECKSUM"
          # Overwrite the working tree's Package.swift with the binary form.
          # This file is only committed on the detached tag commit below;
          # `main` keeps the source manifest.
          sed -e "s|__RELEASE__|${TAG}|g" \
              -e "s|__CHECKSUM__|${CHECKSUM}|g" \
              Scripts/binary-package.swift.tmpl > Package.swift
          echo "--- Generated Package.swift ---"
          cat Package.swift

      - name: Commit, tag, and push the tag only (main is untouched)
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage just the manifest swap; all other build artifacts stay untracked.
          git add Package.swift
          git commit -m "Release ${TAG}"
          git tag -a "${TAG}" -m "Release ${TAG}"
          # Push only the tag. The commit is reachable from the tag on origin,
          # but is NOT advanced onto the branch (main stays on the source manifest).
          git push origin "refs/tags/${TAG}"

      - name: Upload XCFramework zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Release ${{ inputs.tag }}
          files: ${{ runner.temp }}/xc/TagLib.xcframework.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
